user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

stream {
    log_format tcp_proxy '$remote_addr [$time_local] '
                         '$protocol $status $bytes_sent $bytes_received '
                         '$session_time "$upstream_addr"';

    access_log /var/log/nginx/stream_access.log tcp_proxy;

    # OpenVPN backends: two Azure VPN servers, load balanced by source IP
    # hash $remote_addr consistent ensures a given client always hits the same backend
    # (required for stateful UDP sessions)
    upstream vpn_backends {
        hash $remote_addr consistent;
        server 4.198.127.118:1194;   # vpn-au  (australiasoutheast)
        server 23.101.231.126:1194;  # vpn-au2 (australiasoutheast)
    }

    # LANE 1: API (Port 443) → Azure App Service
    server {
        listen 443;
        proxy_pass api.oogiservices.net:443;
        proxy_connect_timeout 10s;
        proxy_timeout 60s;
    }

    # LANE 2: SQL (Port 1433) → Azure SQL
    server {
        listen 1433;
        proxy_pass oogi-aim-management.database.windows.net:1433;
        proxy_connect_timeout 30s;
        proxy_timeout 60m;
    }

    # LANE 3: MQTT (Port 8883) → Azure IoT Hub
    server {
        listen 8883;
        proxy_pass synap-iot-production.azure-devices.net:8883;
        proxy_connect_timeout 30s;
        proxy_timeout 60m;
    }

    # LANE 4: Metrics (Port 8086)
    server {
        listen 8086;
        proxy_pass metrics.oogiservices.net:8086;
        proxy_connect_timeout 30s;
        proxy_timeout 60m;
    }

    # LANE 5: OpenVPN (Port 1194 UDP) → Azure VPN servers
    server {
        listen 1194 udp;
        proxy_pass vpn_backends;
        proxy_connect_timeout 10s;
        proxy_timeout 60s;
    }

    # LANE 6: IKEv2 (UDP 500/4500) → Azure VPN Gateway
    server {
        listen 500 udp;
        proxy_pass azuregateway-857e0077-c9da-4129-a201-709895d85810-c11bb0dae7e3.vpn.azure.com:500;
        proxy_connect_timeout 10s;
        proxy_timeout 60s;
    }

    server {
        listen 4500 udp;
        proxy_pass azuregateway-857e0077-c9da-4129-a201-709895d85810-c11bb0dae7e3.vpn.azure.com:4500;
        proxy_connect_timeout 10s;
        proxy_timeout 60s;
    }
}

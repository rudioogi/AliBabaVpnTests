# VPN updater endpoint — listens directly on port 8444 (no SNI routing needed).
# MikroTik connects to https://120.79.157.95:8444/update-vpn-ip with check-certificate=no.
# Self-signed cert is fine; security comes from the bearer token.
#
# Place in /etc/nginx/sites-available/vpn-updater and symlink to sites-enabled.
# Also open TCP 8444 in the China ECS security group.

server {
    listen 8444 ssl;

    ssl_certificate     /etc/nginx/ssl/vpn-updater/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/vpn-updater/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location = /update-vpn-ip {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:5000;
    }

    location / {
        return 404;
    }
}

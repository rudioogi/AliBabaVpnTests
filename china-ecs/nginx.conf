user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

stream {
    map_hash_bucket_size 128;

    # Port 443: route by SNI hostname
    # - Android connectivity check hostnames → local (returns 204, keeps WiFi connected)
    # - Azure VPN Gateway hostname → direct (doesn't traverse US ECS)
    # - Everything else → US ECS via CEN
    map $ssl_preread_server_name $backend {
        connectivitycheck.gstatic.com  127.0.0.1:8443;
        clients3.google.com            127.0.0.1:8443;
        azuregateway-857e0077-c9da-4129-a201-709895d85810-c11bb0dae7e3.vpn.azure.com  13.68.128.105:443;
default                        10.1.1.96:443;
    }

    server {
        listen 443;
        proxy_pass $backend;
        ssl_preread on;
    }

    # Port 1194 UDP: OpenVPN → US ECS via CEN → Azure
    # IMPORTANT: must point to US ECS (10.1.1.96), NOT directly to Azure public IP.
    # Direct China → Azure UDP 1194 is blocked by the Great Firewall.
    server {
        listen 1194 udp;
        proxy_pass 10.1.1.96:1194;
    }

    server {
        listen 1433;
        proxy_pass 10.1.1.96:1433;
    }

    server {
        listen 8883;
        proxy_pass 10.1.1.96:8883;
    }

    server {
        listen 8086;
        proxy_pass 10.1.1.96:8086;
    }

    # IKE / IKEv2 (Azure VPN Gateway)
    server {
        listen 500 udp;
        proxy_pass 10.1.1.96:500;
    }

    server {
        listen 4500 udp;
        proxy_pass 10.1.1.96:4500;
    }
}

http {
    # Connectivity checks — Android (204) and Windows NCSI (200 with body)
    server {
        listen 80;
        location /connecttest.txt {
            add_header Content-Type text/plain;
            return 200 "Microsoft Connect Test";
        }
        location / {
            return 204;
        }
    }

    # HTTPS connectivity check
    server {
        listen 8443 ssl;
        ssl_certificate      /etc/nginx/ssl/connectivity.crt;
        ssl_certificate_key  /etc/nginx/ssl/connectivity.key;
        return 204;
    }
}
